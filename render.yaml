services:
  - type: web
    name: tikatuka-server
    env: node
    region: singapore
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: CLIENT_ORIGIN
        value: https://tikatuka-client.onrender.com
      - key: PORT
        value: 3001

  - type: static
    name: tikatuka-client
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_SERVER_URL
        value: https://tikatuka-server.onrender.com
